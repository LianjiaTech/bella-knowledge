#-------------------------------------------------------
# TEST环境配置区域
#-------------------------------------------------------
# 重要说明
# 此配置区域仅在TEST环境中生效，只能定义测试环境中默认且长期不变
# 的配置项，例如测试环境中的通用超时时间等，外部资源如数据库连接
# 等请务必通过Apollo配置中心进行配置，切勿在此文件中定义
#-------------------------------------------------------

# ----- 作业调度 测试环境配置 -----
lianjia-schedule:
  enabled: false
  env: official_offline_3
  token: xxxxxxxxxxxxxxxx
lianjia:
  # ----- kms动态密钥管理组件 http://example.com/project/6658/wiki/page/21427 -----
  kms:
    client:
      enabled: false
      timeout: 2000
      endpoint: http://example.com
      spareEndpoint: http://example.com
      service-id: ${spring.application.name}
  # ----- Openiam验签鉴权组件(供服务提供方使用) http://example.com/project/1402/wiki/page/18528 -----
  openiam:
    client:
      enabled: false
      # 请在服务云上生成测试环境的ak/sk
      access-key-id: <your-access-key-id>
      access-key-secret: <your-access-key-secret>
      target-uri: discovery://openiam
    validation:
      principal-detection-strategy: auto_detect_when_miss
      default-fallback-strategy: accept
      default-validation-strategy: authentication
      # 请在服务云上IAM接入向导处获取测试环境的资源/动作前缀
      resource-prefix: <your-resource-prefix>
      action-prefix: <your-action-prefix>
      http:
        enabled: true
        filter-uri: /api/**
api:
  # ----- api-signature请求加签组件(供服务调用方使用) http://example.com/project/1402/wiki/page/18501 -----
  signature:
    feign:
      keychains:
        example: { access-key-id: 123, access-key-secret: 456 }
# ----- 启用扩展后的ribbon负载均衡组件 测试环境 -----
ribbon:
  NIWSServerListFilterClassName: com.lianjia.infrastructure.loadbalance.ribbon.filter.DoNothingServerListFilter
  NFLoadBalancerClassName: com.lianjia.infrastructure.loadbalance.ribbon.loadbalancer.RolePreferenceZoneAwareLoadBalancer

# ----- 日志级别配置 测试环境 -----
logging:
  level:
    root: INFO
    druid: INFO
    executableSql: INFO
    org:
      springframework: INFO
      jooq: DEBUG

spring:
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
      resolve-lazily: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  kafka:
    producer:
      bootstrap-servers: kafka1.example.com:9092,kafka2.example.com:9092,kafka3.example.com:9092
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      topic:
        broadcast: example-topic

bella:
  open-api-base: https://api.example.com/
  file-api:
    processer-name:
      - indexing
      - parser
    file:
      tmp-file-dir: /data0/www/privdata/example-file-api
    bucket-name:
      vision: test
      general: test

s3:
  ak: access_key
  sk: secret_key
  endpoint_write: http://storage.example.com
  endpoint_read: http://storage.example.com
server:
  tomcat:
    max-swallow-size: -1
