#-------------------------------------------------------
# Docker环境配置区域
#-------------------------------------------------------
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/bella_file_api?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:bella_user}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
      resolve-lazily: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:bella123}
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      value-serializer: ${KAFKA_PRODUCER_VALUE_SERIALIZER:org.springframework.kafka.support.serializer.JsonSerializer}
      key-serializer: ${KAFKA_PRODUCER_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
      topic:
        broadcast: ${KAFKA_TOPIC_BROADCAST:bella_file_api}
app:
  id: bella-file-api

bella:
  open-api-base: ${BELLA_OPEN_API_BASE:http://localhost:8080/}
  file-api:
    file:
      tmp-file-dir: /opt/bella-file-api/cache
    bucket-name:
      public: ${BELLA_STORAGE_S3_BUCKET:test}
      private: ${BELLA_STORAGE_S3_BUCKET:test}
    storage:
      type: ${BELLA_STORAGE_TYPE:local}
      s3:
        ak: ${S3_ACCESS_KEY:}
        sk: ${S3_SECRET_KEY:}
        endpoint: ${S3_ENDPOINT:http://bella-minio:9000}
        region: ${S3_REGION:us-east-1}
  server:
    initializer:
      enabled: true

apollo:
  bootstrap:
    enabled: false
    eagerLoad:
      enabled: true
    namespaces: application

management:
  endpoints:
    web:
      exposure:
        include: 'health,info,prometheus'
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  health:
    redis:
      enabled: false

# ----- 日志级别配置 Docker环境 -----
logging:
  level:
    root: INFO
    druid: INFO
    executableSql: INFO
    org:
      springframework: INFO
      jooq: INFO
