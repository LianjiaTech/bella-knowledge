name: bella-file-api
version: "3.8"

# 使用bella-workflow的中间件网络
networks:
  bella-infrastructure_bella-network:
    external: true

services:
  # Spring Boot File API 服务
  bella-file-api:
    image: ${REGISTRY:-bellatop}/bella-file-api:${VERSION:-latest}
    build:
      context: ../
      dockerfile: api/Dockerfile
      args:
        - MAVEN_ARGS="-Dmaven.test.skip=true -U -Dmaven.build.cache.enabled=false"
        - MAVEN_MIRROR=${MAVEN_MIRROR:-aliyun}
    container_name: bella-file-api
    ports:
      - "${API_PORT:-8081}:8081"
      - "${DEBUGPORT:-9008}:9008"
    environment:
      - kafka.enabled=${KAFKA_ENABLED:-false}
      # 日志配置
      - LOG_PATH=${LOG_PATH:-/opt/bella-file-api/applogs}
      
      # Java 配置 - 使用环境变量让run.sh脚本读取
      - Xms=${API_MIN_HEAP:-512m}
      - Xmx=${API_MAX_HEAP:-1024m}
      - MetaspaceSize=${API_METASPACE:-128m}
      - MaxMetaspaceSize=${API_MAX_METASPACE:-256m}
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_TYPE=${PROXY_TYPE:-}
      - STORAGE_CONFIG=${STORAGE_CONFIG:-}
      
      # 数据库配置 (连接到bella-workflow的MySQL)
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      
      # Redis配置 (连接到bella-workflow的Redis)
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # S3存储配置 (连接到bella-workflow的MinIO)
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-bella-file-api}
      - S3_ROOT_PATH=${S3_ROOT_PATH:-files}
      
      # 应用配置
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - BELLA_OPEN_API_BASE=${BELLA_OPEN_API_BASE}
      - BELLA_OPENAPI_URL=${BELLA_OPENAPI_URL}
      - BELLA_SESSION_COOKIE_DOMAIN=${BELLA_SESSION_COOKIE_DOMAIN}
      - BELLA_STORAGE_TYPE=${BELLA_STORAGE_TYPE:-s3}
      - BELLA_TMP_FILE_DIR=${BELLA_TMP_FILE_DIR:-/opt/bella-file-api/cache}
      - BELLA_STORAGE_S3_BUCKET=${S3_BUCKET:-bella-file-api}
      
      # 环境变量
      - IDC=zeus
      - MODULE=bella-file-api
      - ENVTYPE=docker
      - DEBUGPORT=9008
      - JMXPORT=9009
      - MATRIX_CODE_DIR=/opt/bella-file-api/htdocs
      - MATRIX_APPLOGS_DIR=/opt/bella-file-api/applogs
      - MATRIX_ACCESSLOGS_DIR=/opt/bella-file-api/logs
      - MATRIX_LOGS_DIR=/opt/bella-file-api/logs
      - MATRIX_CACHE_DIR=/opt/bella-file-api/cache
      - MATRIX_PRIVDATA_DIR=/opt/bella-file-api/privdata
      - TZ=${TZ:-UTC}
    volumes:
      # 挂载日志和配置目录
      - ../api/logs:/opt/bella-file-api/applogs
      - ../api/cache:/opt/bella-file-api/cache
      - ../api/privdata:/opt/bella-file-api/privdata
    env_file:
      - .env.app
    networks:
      - bella-infrastructure_bella-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Web 前端服务
  bella-file-web:
    image: ${REGISTRY:-bellatop}/bella-file-web:${VERSION:-latest}
    build:
      context: ../
      dockerfile: web/Dockerfile
    container_name: bella-file-web
    ports:
      - "${WEB_PORT:-3001}:3000"
    environment:
      - NEXT_PUBLIC_BELLA_FILE_API_URL=http://${API_HOST:-bella-file-api}:${API_PORT:-8081}
      - NEXT_PUBLIC_BELLA_OPENAPI_URL=${BELLA_OPEN_API_BASE:-https://localhost:8080/}
      - NEXT_PUBLIC_ALLOWED_DEV_ORIGINS=${ALLOWED_DEV_ORIGINS:-}
      - PORT=3000
      - TZ=${TZ:-UTC}
    env_file:
      - .env.app
    networks:
      - bella-infrastructure_bella-network